<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risk breakdown — Sankey infographic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Was 1200px; ~4× cap for wide monitors / horizontal scroll */
      --wrap-max-width: min(96vw, 4800px);
      --bg: #0c0f14;
      --panel: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.14);
      --text: #e8eaef;
      --muted: #9aa3b2;
      --accent: #6d98ff;
      --link: rgba(109, 152, 255, 0.24);
      --link-highlight: rgba(109, 152, 255, 0.72);
      --node: rgba(255, 255, 255, 0.16);
      --node-highlight: rgba(109, 152, 255, 0.92);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: var(--wrap-max-width);
      width: 100%;
      margin: 0 auto;
      padding: 2rem clamp(1rem, 2vw, 2.5rem) 2.5rem;
    }

    .hero {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel) 0%, transparent 100%);
      border-radius: 10px;
      padding: 1rem 1.15rem;
      margin-bottom: 1rem;
    }

    .hero h1 {
      margin: 0 0 0.3rem;
      font-size: clamp(1.45rem, 3.2vw, 2rem);
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.4;
    }

    .chart-shell {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: linear-gradient(180deg, var(--panel) 0%, transparent 100%);
      padding: 0.5rem;
      overflow-x: auto;
    }

    #sankey {
      width: 100%;
      min-width: 100%;
      height: 1320px;
      display: block;
    }

    .link {
      fill: none;
      stroke: var(--link);
      stroke-opacity: 0.8;
      mix-blend-mode: screen;
    }

    .link.highlight {
      stroke: var(--link-highlight);
      filter: drop-shadow(0 0 3px rgba(109, 152, 255, 0.38));
      stroke-opacity: 1;
    }

    .node rect {
      fill: var(--node);
      stroke: rgba(255, 255, 255, 0.2);
      stroke-width: 1;
      rx: 4;
      ry: 4;
    }

    .node.highlight rect {
      fill: var(--node-highlight);
      stroke: rgba(109, 152, 255, 1);
      filter: drop-shadow(0 0 5px rgba(109, 152, 255, 0.45));
    }

    .node text {
      font-size: 12px;
      fill: var(--text);
      dominant-baseline: middle;
      pointer-events: none;
      text-shadow: 0 1px 1px rgba(0,0,0,0.35);
    }

    .legend {
      margin-top: 0.65rem;
      color: var(--muted);
      font-size: 0.83rem;
    }

    .chart-container.chart-enter {
      opacity: 0;
      transform: translateY(10px);
    }
    .chart-container.chart-enter-active {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 320ms ease-in-out, transform 320ms cubic-bezier(0.34, 1.56, 0.64, 1);
      will-change: transform, opacity;
    }
    .chart-container.chart-enter-active.will-change-cleanup {
      will-change: auto;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1 id="title"></h1>
      <p id="subtitle"></p>
    </section>

    <section class="chart-shell">
      <div class="chart-container" id="infographicSankeyWrap" style="min-height:1320px;">
        <svg id="sankey" aria-label="Risk breakdown Sankey chart"></svg>
      </div>
      <div class="legend">Highlighted path shows current drill-down focus.</div>
    </section>
  </main>

  <script src="static/js/chart-entrance.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
  <script>
    const SANKEY_CONFIG = {
      title: "Risk breakdown — Sankey infographic",
      subtitle: "Includes your original percentage splits and branch-specific colors for readability.",

      // Absolute scale (100 = 100% of total exposure)
      totalValue: 100,

      // Top split
      nonTechnicalValue: 50,
      technicalValue: 50,

      // Technical split (50 total)
      humanCentricValue: 25,
      technicalExploitationValue: 25,

      // Human-centric breakdown
      phishingValue: 15,
      driveByValue: 5,
      attachmentsValue: 5,

      // Technical exploitation breakdown
      cvesValue: 13.75,
      bruteValue: 6.25,
      credentialStuffingValue: 5,

      // Of CVEs
      noKnownBreachValue: 13.4475,
      breachesOnlyValue: 0.275,
      breachesAndLossesValue: 0.0275,

      // Of losses
      neverReportedValue: 0.006875,
      notInsuredValue: 0.006875,
      nonCveOrIncompleteValue: 0.006875,
      coveredValue: 0.006875,

      // Covered losses subset (counts, normalized to total scale)
      coveredCvesValue: 0.006875,
      scannableValue: 0.003596,
      notScannableValue: 0.003214,
      unclassifiedTailValue: 0.000065,

      // Display labels with original percentages included
      labels: {
        total: "100% total exposure",
        nonTechnical: "Non-technical losses",
        technical: "Technical losses / compromises",
        humanCentric: "Human-centric exploitation (50%)",
        technicalExploitation: "Technical exploitation (50%)",
        phishing: "Phishing / vishing / smishing / spear phishing (30%)",
        driveBy: "Drive-by downloads (10%)",
        attachments: "Malicious attachments (10%)",
        cves: "CVEs (25-30%)",
        brute: "Brute force (10-15%)",
        credentialStuffing: "Credential stuffing (10%)",
        noKnownBreach: "Unused CVEs (97.8-98.6% of CVEs)",
        breachesOnly: "Breaches only (1.2-2.1% of CVEs)",
        breachesAndLosses: "Breaches and losses (0.2% of CVEs)",
        neverReported: "Never reported (?%)",
        notInsured: "Not insured (?%)",
        nonCveOrIncomplete: "Incomplete DFIR (?%)",
        covered: "Covered (?%)",
        coveredCves: "558 CVEs",
        scannable: "292 scannable remotely (52.3%)",
        notScannable: "266 not remotely scannable (48.1%)"
      },

      // Branch colors
      colors: {
        nonTechnical: "#64748b",
        human: "#14b8a6",
        technical: "#3b82f6",
        cve: "#f59e0b",
        losses: "#ef4444",
        covered: "#a855f7",
        scannable: "#06b6d4",
      },

      highlightPath: ["total", "technical", "technicalExploitation", "cves", "breachesAndLosses", "covered", "coveredCves", "scannable"],
      nodePadding: 34,
      nodeWidth: 16,
    };

    window.SANKEY_CONFIG = SANKEY_CONFIG;

    function makeData(cfg) {
      const L = cfg.labels;
      const nodes = [
        { id: "total", name: L.total, layer: 0, order: 0, branch: "technical" },
        { id: "nonTechnical", name: L.nonTechnical, layer: 1, order: 0, branch: "nonTechnical" },
        { id: "technical", name: L.technical, layer: 1, order: 1, branch: "technical" },
        { id: "humanCentric", name: L.humanCentric, layer: 2, order: 0, branch: "human" },
        { id: "technicalExploitation", name: L.technicalExploitation, layer: 2, order: 1, branch: "technical" },
        { id: "phishing", name: L.phishing, layer: 3, order: 0, branch: "human" },
        { id: "driveBy", name: L.driveBy, layer: 3, order: 1, branch: "human" },
        { id: "attachments", name: L.attachments, layer: 3, order: 2, branch: "human" },
        { id: "brute", name: L.brute, layer: 3, order: 3, branch: "technical" },
        { id: "credentialStuffing", name: L.credentialStuffing, layer: 3, order: 4, branch: "technical" },
        { id: "cves", name: L.cves, layer: 3, order: 5, branch: "technical" },
        { id: "noKnownBreach", name: L.noKnownBreach, layer: 4, order: 0, branch: "cve" },
        { id: "breachesOnly", name: L.breachesOnly, layer: 4, order: 1, branch: "cve" },
        { id: "breachesAndLosses", name: L.breachesAndLosses, layer: 4, order: 2, branch: "losses" },
        { id: "neverReported", name: L.neverReported, layer: 5, order: 0, branch: "losses" },
        { id: "notInsured", name: L.notInsured, layer: 5, order: 1, branch: "losses" },
        { id: "nonCveOrIncomplete", name: L.nonCveOrIncomplete, layer: 5, order: 2, branch: "losses" },
        { id: "covered", name: L.covered, layer: 5, order: 3, branch: "covered" },
        { id: "coveredCves", name: L.coveredCves, layer: 6, order: 0, branch: "covered" },
        { id: "scannable", name: L.scannable, layer: 7, order: 0, branch: "scannable" },
        { id: "notScannable", name: L.notScannable, layer: 7, order: 1, branch: "covered" }
      ];

      const links = [
        { source: "total", target: "nonTechnical", value: cfg.nonTechnicalValue, branch: "nonTechnical" },
        { source: "total", target: "technical", value: cfg.technicalValue, branch: "technical" },
        { source: "technical", target: "humanCentric", value: cfg.humanCentricValue, branch: "human" },
        { source: "technical", target: "technicalExploitation", value: cfg.technicalExploitationValue, branch: "technical" },
        { source: "humanCentric", target: "phishing", value: cfg.phishingValue, branch: "human" },
        { source: "humanCentric", target: "driveBy", value: cfg.driveByValue, branch: "human" },
        { source: "humanCentric", target: "attachments", value: cfg.attachmentsValue, branch: "human" },
        { source: "technicalExploitation", target: "cves", value: cfg.cvesValue, branch: "technical" },
        { source: "technicalExploitation", target: "brute", value: cfg.bruteValue, branch: "technical" },
        { source: "technicalExploitation", target: "credentialStuffing", value: cfg.credentialStuffingValue, branch: "technical" },
        { source: "cves", target: "noKnownBreach", value: cfg.noKnownBreachValue, branch: "cve" },
        { source: "cves", target: "breachesOnly", value: cfg.breachesOnlyValue, branch: "cve" },
        { source: "cves", target: "breachesAndLosses", value: cfg.breachesAndLossesValue, branch: "losses" },
        { source: "breachesAndLosses", target: "neverReported", value: cfg.neverReportedValue, branch: "losses" },
        { source: "breachesAndLosses", target: "notInsured", value: cfg.notInsuredValue, branch: "losses" },
        { source: "breachesAndLosses", target: "nonCveOrIncomplete", value: cfg.nonCveOrIncompleteValue, branch: "losses" },
        { source: "breachesAndLosses", target: "covered", value: cfg.coveredValue, branch: "covered" },
        { source: "covered", target: "coveredCves", value: cfg.coveredCvesValue, branch: "covered" },
        { source: "coveredCves", target: "scannable", value: cfg.scannableValue, branch: "scannable" },
        { source: "coveredCves", target: "notScannable", value: cfg.notScannableValue, branch: "covered" }
      ];

      return { nodes, links };
    }

    function colorForBranch(cfg, branch) {
      return cfg.colors[branch] || "#94a3b8";
    }

    function renderSankey() {
      const cfg = SANKEY_CONFIG;
      const data = makeData(cfg);

      document.getElementById("title").textContent = cfg.title;
      document.getElementById("subtitle").textContent = cfg.subtitle;

      const svg = d3.select("#sankey");
      svg.selectAll("*").remove();

      const fallbackW = Math.min(4800, Math.max(1100, (window.innerWidth || 1200) - 48));
      const width = svg.node().clientWidth || fallbackW;
      const height = svg.node().clientHeight || 1320;

      const sankey = d3.sankey()
        .nodeId((d) => d.id)
        .nodeWidth(cfg.nodeWidth)
        .nodePadding(cfg.nodePadding)
        .nodeSort((a, b) => a.order - b.order)
        .extent([[14, 10], [width - 14, height - 10]])
        .nodeAlign((d) => d.layer);

      const graph = sankey({
        nodes: data.nodes.map((d) => ({ ...d })),
        links: data.links.map((d) => ({ ...d })),
      });

      const highlightPairs = new Set();
      for (let i = 0; i < cfg.highlightPath.length - 1; i += 1) {
        highlightPairs.add(`${cfg.highlightPath[i]}->${cfg.highlightPath[i + 1]}`);
      }
      const highlightNodeIds = new Set(cfg.highlightPath);

      const linkLayer = svg.append("g").attr("class", "sankey-links");
      const linkSel = linkLayer
        .selectAll("path")
        .data(graph.links)
        .join("path")
        .attr("class", (d) => highlightPairs.has(`${d.source.id}->${d.target.id}`) ? "link highlight" : "link")
        .attr("d", d3.sankeyLinkHorizontal())
        .attr("stroke", (d) => colorForBranch(cfg, d.branch))
        .attr("stroke-opacity", (d) => highlightPairs.has(`${d.source.id}->${d.target.id}`) ? 0.95 : 0.45)
        .attr("stroke-width", (d) => Math.max(1.2, d.width));

      linkSel.each(function(d, i) {
        const len = this.getTotalLength();
        const easeOpacity = typeof window.chartEasingOpacity === "function" ? window.chartEasingOpacity : d3.easeQuadInOut;
        d3.select(this)
          .attr("stroke-dasharray", len)
          .attr("stroke-dashoffset", len)
          .transition()
          .duration(320)
          .delay(i * 40)
          .ease(easeOpacity)
          .attr("stroke-dashoffset", 0);
      });

      const node = svg.append("g")
        .selectAll("g")
        .data(graph.nodes)
        .join("g")
        .attr("class", (d) => highlightNodeIds.has(d.id) ? "node highlight" : "node");

      node.each(function(d, i) {
        const cx = (d.x0 + d.x1) / 2;
        const cy = (d.y0 + d.y1) / 2;
        const easeElastic = typeof window.chartEasingElastic === "function" ? window.chartEasingElastic : (typeof d3.easeBackOut === "function" ? d3.easeBackOut : d3.easeCubicOut);
        d3.select(this)
          .attr("transform", `translate(${cx},${cy}) scale(0.6) translate(${-cx},${-cy})`)
          .style("opacity", 0)
          .transition()
          .duration(320)
          .delay(i * 40)
          .ease(easeElastic)
          .attr("transform", null)
          .style("opacity", 1);
      });

      node.append("rect")
        .attr("x", (d) => d.x0)
        .attr("y", (d) => d.y0)
        .attr("height", (d) => Math.max(1, d.y1 - d.y0))
        .attr("width", (d) => d.x1 - d.x0)
        .attr("fill", (d) => d3.color(colorForBranch(cfg, d.branch)).copy({ opacity: highlightNodeIds.has(d.id) ? 0.88 : 0.5 }))
        .attr("stroke", (d) => colorForBranch(cfg, d.branch));

      node.append("text")
        .attr("x", (d) => d.x0 < width / 2 ? d.x1 + 8 : d.x0 - 8)
        .attr("y", (d) => (d.y0 + d.y1) / 2)
        .attr("text-anchor", (d) => d.x0 < width / 2 ? "start" : "end")
        .text((d) => d.name);

      node.append("title")
        .text((d) => `${d.name}\n${d.value.toFixed(4)}% of total`);
    }

    var resizeTimer;
    function onResizeSankey() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(renderSankey, 200);
    }

    if (typeof whenChartInView === "function") {
      whenChartInView("infographicSankeyWrap", function() {
        renderSankey();
        window.addEventListener("resize", onResizeSankey);
      });
    } else {
      renderSankey();
      window.addEventListener("resize", onResizeSankey);
    }
  </script>
</body>
</html>
