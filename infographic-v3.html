<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Threat Hierarchy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f4f0;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --text: #1a1a18;
      --text2: #5f5e5a;
      --text3: #888780;
      --radius: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #252522;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.2);
        --text: #e8e6de;
        --text2: #9c9a92;
        --text3: #6b6a64;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .page-header p {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.5;
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
      font-size: 12px;
      color: var(--text2);
      padding: 0.6rem 1rem;
      border-radius: var(--radius);
      background: var(--bg2);
      border: 0.5px solid var(--border);
    }

    .li {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .ld {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .ctrl-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 0.5rem;
      gap: 6px;
    }

    .ctrl-btn {
      font-size: 12px;
      color: var(--text2);
      background: none;
      border: 0.5px solid var(--border2);
      border-radius: 6px;
      padding: 4px 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s;
    }

    .ctrl-btn:hover {
      background: var(--bg2);
    }

    /* Tree */
    .tnode { margin: 1px 0; }

    .trow {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 7px 10px;
      border-radius: var(--radius);
      transition: background 0.1s;
    }

    .trow.clickable {
      cursor: pointer;
    }

    .trow.clickable:hover {
      background: var(--bg2);
    }

    .cbar {
      width: 3px;
      height: 20px;
      border-radius: 2px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .tinfo {
      flex: 1;
      min-width: 0;
    }

    .tlabel {
      font-size: 14px;
      color: var(--text);
      line-height: 1.3;
    }

    .tnote {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
    }

    .tpct {
      font-size: 12px;
      font-weight: 500;
      padding: 2px 9px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .tchev {
      font-size: 10px;
      color: var(--text3);
      width: 14px;
      text-align: center;
      flex-shrink: 0;
      transition: transform 0.2s;
      margin-top: 4px;
    }

    .tnode.open > .trow .tchev {
      transform: rotate(90deg);
    }

    .tchildren {
      padding-left: 10px;
      border-left: 0.5px solid var(--border);
      margin-left: 16px;
    }

    .tnode.closed > .tchildren {
      display: none;
    }

    /* Color bars */
    .cb-gray   { background: #888780; }
    .cb-blue   { background: #378ADD; }
    .cb-coral  { background: #D85A30; }
    .cb-teal   { background: #1D9E75; }
    .cb-amber  { background: #EF9F27; }
    .cb-red    { background: #E24B4A; }

    /* Badges - light mode */
    .tb-gray   { background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border); }
    .tb-blue   { background: #E6F1FB; color: #185FA5; }
    .tb-coral  { background: #FAECE7; color: #993C1D; }
    .tb-teal   { background: #E1F5EE; color: #0F6E56; }
    .tb-amber  { background: #FAEEDA; color: #854F0B; }
    .tb-red    { background: #FCEBEB; color: #A32D2D; }

    /* Badges - dark mode overrides */
    @media (prefers-color-scheme: dark) {
      .tb-blue  { background: #042C53; color: #85B7EB; }
      .tb-coral { background: #4A1B0C; color: #F0997B; }
      .tb-teal  { background: #04342C; color: #5DCAA5; }
      .tb-amber { background: #412402; color: #EF9F27; }
      .tb-red   { background: #501313; color: #F09595; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1>Security threat hierarchy</h1>
      <p>All pathways to unwanted data access, business disruption, or compromise — broken down by attack vector and measured impact. Click any row to expand or collapse.</p>
    </div>

    <div class="legend">
      <span class="li"><span class="ld" style="background:#D85A30"></span> Human-centric</span>
      <span class="li"><span class="ld" style="background:#378ADD"></span> Technical</span>
      <span class="li"><span class="ld" style="background:#1D9E75"></span> Covered / actionable</span>
      <span class="li"><span class="ld" style="background:#EF9F27"></span> Partial impact</span>
      <span class="li"><span class="ld" style="background:#E24B4A"></span> Full breach + loss</span>
      <span class="li"><span class="ld" style="background:#888780"></span> Unknown / neutral</span>
    </div>

    <div class="ctrl-row">
      <button class="ctrl-btn" onclick="setAll(true)">Expand all</button>
      <button class="ctrl-btn" onclick="setAll(false)">Collapse all</button>
    </div>

    <div id="tt"></div>
  </div>

  <script>
    const D = {
      id: 'root', label: '100% total exposure', note: 'All pathways to unwanted data access, disruption, or compromise', pct: '100%', color: 'gray', open: true,
      children: [
        {
          id: 'nontch', label: 'Non-technical losses', note: 'Stolen laptops, physical theft, outages, insider threats', pct: '?%', color: 'gray', children: []
        },
        {
          id: 'tech', label: 'Technical losses / compromises', note: 'Measurable cyber incidents — split below', pct: '?%', color: 'blue', open: true,
          children: [
            {
              id: 'human', label: 'Human-centric exploitation', pct: '50%', color: 'coral', open: true,
              children: [
                { id: 'phish',  label: 'Phishing / vishing / smishing / spear phishing', pct: '30%', color: 'coral', children: [] },
                { id: 'drby',   label: 'Drive-by downloads', note: 'Malicious sites exploiting unpatched browsers', pct: '10%', color: 'coral', children: [] },
                { id: 'malat',  label: 'Malicious attachments', note: 'Via email and chat platforms', pct: '10%', color: 'coral', children: [] }
              ]
            },
            {
              id: 'techex', label: 'Technical exploitation', pct: '50%', color: 'blue', open: true,
              children: [
                { id: 'brute', label: 'Brute force', note: 'Automated password guessing attacks', pct: '10–15%', color: 'blue', children: [] },
                { id: 'cred',  label: 'Credential stuffing', note: 'Reuse of previously leaked credentials', pct: '10%', color: 'blue', children: [] },
                {
                  id: 'cves', label: 'CVEs', note: 'Known vulnerability exploits', pct: '25–30%', color: 'blue', open: true,
                  children: [
                    { id: 'unused', label: 'No known use in a breach', note: 'Patching these has no measurable loss-reduction benefit (yet)', pct: '97.8–98.6%', color: 'gray', children: [] },
                    { id: 'bonly',  label: 'Breaches only', note: 'Exploited but no quantified financial loss on record', pct: '1.2–2.1%', color: 'amber', children: [] },
                    {
                      id: 'bloss', label: 'Breaches + losses', note: 'Exploited with quantified financial impact', pct: '0.2%', color: 'red',
                      children: [
                        { id: 'norep',  label: 'Never reported', note: 'Loss occurred but was never disclosed', pct: '?%', color: 'gray', children: [] },
                        { id: 'noins',  label: 'Not insured', note: 'No cyber insurance coverage', pct: '?%', color: 'gray', children: [] },
                        { id: 'nodfir', label: 'Incomplete DFIR', note: 'No forensic report linking CVE to loss', pct: '?%', color: 'gray', children: [] },
                        {
                          id: 'cov', label: 'Covered losses', note: 'Cyber insurance claim filed and attributed to a CVE', pct: '?%', color: 'teal',
                          children: [
                            {
                              id: 'c558', label: '558 CVEs', note: 'The specific CVEs linked to covered insurance losses — the highest-priority patch targets', pct: '', color: 'teal',
                              children: [
                                { id: 'scan',   label: 'Remotely scannable', note: 'Detectable via external vulnerability scanning', pct: '292 (52.3%)', color: 'teal', children: [] },
                                { id: 'noscan', label: 'Not remotely scannable', note: 'Internal-only or unsafe to scan for remotely', pct: '266 (47.7%)', color: 'gray', children: [] }
                              ]
                            }
                          ]
                        }
                      ]
                    }
                  ]
                }
              ]
            }
          ]
        }
      ]
    };

    function render(n) {
      const hc = n.children && n.children.length > 0;
      const isOpen = n.open !== false;
      return `
        <div class="tnode ${hc ? (isOpen ? 'open' : 'closed') : ''}" id="n-${n.id}">
          <div class="trow ${hc ? 'clickable' : ''}" ${hc ? `onclick="tog('${n.id}')"` : ''}>
            <div class="cbar cb-${n.color}"></div>
            <div class="tinfo">
              <div class="tlabel">${n.label}</div>
              ${n.note ? `<div class="tnote">${n.note}</div>` : ''}
            </div>
            ${n.pct ? `<span class="tpct tb-${n.color}">${n.pct}</span>` : ''}
            ${hc
              ? `<span class="tchev">&#9658;</span>`
              : `<span style="width:14px;flex-shrink:0"></span>`
            }
          </div>
          ${hc ? `<div class="tchildren">${n.children.map(c => render(c)).join('')}</div>` : ''}
        </div>`;
    }

    function tog(id) {
      const el = document.getElementById('n-' + id);
      el.classList.toggle('open');
      el.classList.toggle('closed');
    }

    function setAll(open) {
      document.querySelectorAll('.tnode').forEach(el => {
        if (el.querySelector('.tchildren')) {
          el.classList.toggle('open', open);
          el.classList.toggle('closed', !open);
        }
      });
    }

    document.getElementById('tt').innerHTML = render(D);
  </script>
</body>
</html>
